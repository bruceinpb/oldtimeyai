          if gcloud secrets describe GITHUB_PAT --project=oldtimeyai-928be --quiet 2>/dev/null; then
            echo "GITHUB_PAT secret already exists"
          else
            echo "Creating GITHUB_PAT secret..."
            echo -n "placeholder-add-real-value-via-github-secret" | \
              gcloud secrets create GITHUB_PAT --data-file=- --replication-policy=automatic --project=oldtimeyai-928be
            echo "Created GITHUB_PAT secret"
          fi
          # Grant compute SA access so Cloud Function can read the secret
          gcloud secrets add-iam-policy-binding GITHUB_PAT \
